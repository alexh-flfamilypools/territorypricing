<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-1);}
  .wrap{padding:18px 24px;display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);width:88px;flex-shrink:0;}
  .specimen{outline:1px dashed transparent;border-radius:4px;padding:2px 6px;margin:-2px -6px;cursor:text;}
  .specimen:hover{outline-color:var(--line-1);}
  .specimen:focus{outline:1.5px solid var(--fp-pool);background:var(--fp-pool-wash);}
  .hint{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:6px;}
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="tag">display 56/800</span><span class="fp-display specimen" contenteditable="true" spellcheck="false">Naples to Orlando</span></div>
  <div class="row"><span class="tag">h1 40/700</span><span class="fp-h1 specimen" contenteditable="true" spellcheck="false">Pelican Landing</span></div>
  <div class="row"><span class="tag">h2 28/600</span><span class="fp-h2 specimen" contenteditable="true" spellcheck="false">Coastal premium applies</span></div>
  <div class="row"><span class="tag">h3 20/600</span><span class="fp-h3 specimen" contenteditable="true" spellcheck="false">14 territories updated</span></div>
  <div class="hint">Click any line to edit — Poppins is the heading face.</div>
</div>
</body></html>
