<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-1);font-family:var(--font-body);color:var(--fg-2);}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:repeat(8,1fr);gap:8px;align-items:end;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .bar{background:var(--fp-pool);width:100%;border-radius:4px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
  .nm{font-size:11px;font-weight:600;color:var(--fg-1);}
</style></head>
<body>
<div class="wrap">
  <div class="cell"><div class="bar" style="height:4px"></div><div class="nm">sp-1</div><div class="lbl">4</div></div>
  <div class="cell"><div class="bar" style="height:8px"></div><div class="nm">sp-2</div><div class="lbl">8</div></div>
  <div class="cell"><div class="bar" style="height:12px"></div><div class="nm">sp-3</div><div class="lbl">12</div></div>
  <div class="cell"><div class="bar" style="height:16px"></div><div class="nm">sp-4</div><div class="lbl">16</div></div>
  <div class="cell"><div class="bar" style="height:24px"></div><div class="nm">sp-5</div><div class="lbl">24</div></div>
  <div class="cell"><div class="bar" style="height:32px"></div><div class="nm">sp-6</div><div class="lbl">32</div></div>
  <div class="cell"><div class="bar" style="height:48px"></div><div class="nm">sp-7</div><div class="lbl">48</div></div>
  <div class="cell"><div class="bar" style="height:64px"></div><div class="nm">sp-8</div><div class="lbl">64</div></div>
</div>
</body></html>
