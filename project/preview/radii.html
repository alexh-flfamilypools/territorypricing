<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-1);font-family:var(--font-body);}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{width:64px;height:64px;background:var(--fp-pool-tint);border:1.5px solid var(--fp-pool);}
  .nm{font-size:11px;font-weight:600;color:var(--fg-1);}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);}
</style></head>
<body>
<div class="wrap">
  <div class="cell"><div class="box" style="border-radius:4px"></div><div class="nm">xs</div><div class="px">4px</div></div>
  <div class="cell"><div class="box" style="border-radius:6px"></div><div class="nm">sm</div><div class="px">6px</div></div>
  <div class="cell"><div class="box" style="border-radius:10px"></div><div class="nm">md</div><div class="px">10px</div></div>
  <div class="cell"><div class="box" style="border-radius:14px"></div><div class="nm">lg</div><div class="px">14px</div></div>
  <div class="cell"><div class="box" style="border-radius:20px"></div><div class="nm">xl</div><div class="px">20px</div></div>
  <div class="cell"><div class="box" style="border-radius:999px"></div><div class="nm">pill</div><div class="px">999px</div></div>
</div>
</body></html>
