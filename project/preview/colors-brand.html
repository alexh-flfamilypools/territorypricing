<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-1);font-family:var(--font-body);}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:64px;border-radius:10px;border:1px solid rgba(14,34,51,0.06);}
  .name{font-size:12px;font-weight:600;color:var(--fg-1);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#2BA8E0"></div><div class="name">Pool</div><div class="hex">#2BA8E0</div></div>
  <div class="sw"><div class="chip" style="background:#1E7BC2"></div><div class="name">Pool deep</div><div class="hex">#1E7BC2</div></div>
  <div class="sw"><div class="chip" style="background:#145A93"></div><div class="name">Pool dark</div><div class="hex">#145A93</div></div>
  <div class="sw"><div class="chip" style="background:#D9F0FA"></div><div class="name">Pool tint</div><div class="hex">#D9F0FA</div></div>
  <div class="sw"><div class="chip" style="background:#E8463E"></div><div class="name">Coral</div><div class="hex">#E8463E</div></div>
  <div class="sw"><div class="chip" style="background:#F5A623"></div><div class="name">Sun</div><div class="hex">#F5A623</div></div>
  <div class="sw"><div class="chip" style="background:#2FB39A"></div><div class="name">Palm</div><div class="hex">#2FB39A</div></div>
  <div class="sw"><div class="chip" style="background:#6B3FA0"></div><div class="name">Plum</div><div class="hex">#6B3FA0</div></div>
</div>
</body></html>
