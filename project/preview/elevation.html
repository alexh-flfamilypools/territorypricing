<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-2);font-family:var(--font-body);}
  .wrap{padding:28px 24px;display:grid;grid-template-columns:repeat(5,1fr);gap:18px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:80px;height:60px;background:#fff;border-radius:10px;}
  .nm{font-size:11px;font-weight:600;color:var(--fg-1);}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-align:center;}
</style></head>
<body>
<div class="wrap">
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-1)"></div><div class="nm">shadow-1</div><div class="px">inputs</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-2)"></div><div class="nm">shadow-2</div><div class="px">cards</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-3)"></div><div class="nm">shadow-3</div><div class="px">popovers</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-4)"></div><div class="nm">shadow-4</div><div class="px">modals</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--shadow-pool);background:var(--fp-pool)"></div><div class="nm">shadow-pool</div><div class="px">active marker</div></div>
</div>
</body></html>
