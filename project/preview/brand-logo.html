<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-1);}
  .wrap{padding:20px 24px;display:flex;align-items:center;gap:24px;}
  .logo{height:96px;width:auto;}
  .meta{display:flex;flex-direction:column;gap:6px;}
  .name{font-family:var(--font-display);font-weight:800;font-size:24px;letter-spacing:-0.01em;color:var(--fg-1);}
  .swatches{display:flex;gap:6px;margin-top:4px;}
  .sw{width:18px;height:18px;border-radius:999px;}
</style></head>
<body>
<div class="wrap">
  <img class="logo" src="../assets/logo-full.png" alt="Family Pools"/>
  <div class="meta">
    <div class="name">Family Pools</div>
    <div class="swatches">
      <div class="sw" style="background:#E8463E"></div>
      <div class="sw" style="background:#2FB39A"></div>
      <div class="sw" style="background:#2BA8E0"></div>
      <div class="sw" style="background:#1E7BC2"></div>
      <div class="sw" style="background:#F5A623"></div>
    </div>
  </div>
</div>
</body></html>
