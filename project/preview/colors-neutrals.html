<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-1);font-family:var(--font-body);}
  .wrap{padding:20px 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .sw{display:flex;flex-direction:column;gap:6px;}
  .chip{height:64px;border-radius:10px;border:1px solid rgba(14,34,51,0.08);}
  .name{font-size:12px;font-weight:600;color:var(--fg-1);}
  .hex{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head>
<body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#0E2233"></div><div class="name">Ink</div><div class="hex">#0E2233</div></div>
  <div class="sw"><div class="chip" style="background:#2F4358"></div><div class="name">Ink 2</div><div class="hex">#2F4358</div></div>
  <div class="sw"><div class="chip" style="background:#5A6D80"></div><div class="name">Ink 3</div><div class="hex">#5A6D80</div></div>
  <div class="sw"><div class="chip" style="background:#94A3B2"></div><div class="name">Ink 4</div><div class="hex">#94A3B2</div></div>
  <div class="sw"><div class="chip" style="background:#DDE5EC"></div><div class="name">Line</div><div class="hex">#DDE5EC</div></div>
  <div class="sw"><div class="chip" style="background:#ECF1F5"></div><div class="name">Line 2</div><div class="hex">#ECF1F5</div></div>
  <div class="sw"><div class="chip" style="background:#F4F7FA"></div><div class="name">Canvas</div><div class="hex">#F4F7FA</div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">Surface</div><div class="hex">#FFFFFF</div></div>
</div>
</body></html>
