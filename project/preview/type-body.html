<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-1);}
  .wrap{padding:18px 24px;display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;align-items:baseline;gap:18px;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);width:88px;flex-shrink:0;}
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="tag">body 15/400</span><span class="fp-body">We charge a 10% premium for west-of-McGregor jobs.</span></div>
  <div class="row"><span class="tag">strong 15/600</span><span class="fp-body-strong">Saved. 14 territories updated.</span></div>
  <div class="row"><span class="tag">small 13/500</span><span class="fp-small">Last edited 3 days ago by Marisol</span></div>
  <div class="row"><span class="tag">micro 11/600</span><span class="fp-micro">Owner · Sales rep</span></div>
  <div class="row"><span class="tag">mono 13/500</span><span class="fp-mono">26.1420° N, 81.7948° W</span></div>
  <div class="row"><span class="tag">price</span><span class="fp-price" style="font-size:24px">$112,500</span></div>
</div>
</body></html>
