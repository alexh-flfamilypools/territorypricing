<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-2);font-family:var(--font-body);}
  .wrap{padding:18px;}
  .note{background:#fff;border:1px solid var(--line-1);border-radius:10px;box-shadow:var(--shadow-2);padding:14px 16px;width:340px;display:flex;flex-direction:column;gap:10px;}
  .top{display:flex;justify-content:space-between;align-items:baseline;}
  .name{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--fg-1);}
  .when{font-size:11px;color:var(--fg-3);}
  .body{font-size:13px;line-height:1.5;color:var(--fg-2);}
  .body b{color:var(--fg-1);}
  .tags{display:flex;gap:6px;flex-wrap:wrap;}
  .t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;padding:2px 7px;border-radius:4px;background:var(--bg-2);color:var(--fg-3);}
  .author{display:flex;align-items:center;gap:8px;padding-top:8px;border-top:1px solid var(--line-2);}
  .av{width:22px;height:22px;border-radius:999px;background:var(--fp-palm);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .au{font-size:12px;color:var(--fg-2);font-weight:500;}
</style></head>
<body>
<div class="wrap">
  <div class="note">
    <div class="top">
      <div class="name">Pelican Landing</div>
      <div class="when">Edited 3 days ago</div>
    </div>
    <div class="body">HOA mandates <b>screen enclosure on all west-facing pools</b>. Adds ~$8k. Permit office on Bonita Beach Rd is fast — 5 business days. Salt-tolerant equipment only.</div>
    <div class="tags"><span class="t">HOA</span><span class="t">Saltwater only</span><span class="t">Screen required</span></div>
    <div class="author"><div class="av">MC</div><div class="au">Marisol Cruz · territory owner</div></div>
  </div>
</div>
</body></html>
