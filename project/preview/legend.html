<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-2);font-family:var(--font-body);}
  .wrap{padding:18px;}
  .legend{background:#fff;border:1px solid var(--line-1);border-radius:10px;box-shadow:var(--shadow-2);padding:14px 16px;width:320px;}
  .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .ttl{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--fg-1);}
  .all{font-size:11px;color:var(--fp-pool);font-weight:600;cursor:pointer;}
  .row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:13px;}
  .l{display:flex;align-items:center;gap:10px;color:var(--fg-1);font-weight:500;}
  .sw{width:14px;height:14px;border-radius:4px;}
  .ct{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style></head>
<body>
<div class="wrap">
  <div class="legend">
    <div class="head"><div class="ttl">Pricing tiers</div><div class="all">Show all</div></div>
    <div class="row"><div class="l"><div class="sw" style="background:#BFE3F4"></div>Standard <span style="color:var(--fg-3);font-weight:400">— $72k–$80k</span></div><div class="ct">12</div></div>
    <div class="row"><div class="l"><div class="sw" style="background:#7FCBE8"></div>Preferred <span style="color:var(--fg-3);font-weight:400">— $80k–$92k</span></div><div class="ct">8</div></div>
    <div class="row"><div class="l"><div class="sw" style="background:#2BA8E0"></div>Premium <span style="color:var(--fg-3);font-weight:400">— $92k–$108k</span></div><div class="ct">11</div></div>
    <div class="row"><div class="l"><div class="sw" style="background:#F5A623"></div>Coastal <span style="color:var(--fg-3);font-weight:400">— $108k–$130k</span></div><div class="ct">6</div></div>
    <div class="row"><div class="l"><div class="sw" style="background:#E8463E"></div>Luxe <span style="color:var(--fg-3);font-weight:400">— $130k–$160k</span></div><div class="ct">4</div></div>
    <div class="row"><div class="l"><div class="sw" style="background:#6B3FA0"></div>White-glove <span style="color:var(--fg-3);font-weight:400">— $160k+</span></div><div class="ct">2</div></div>
  </div>
</div>
</body></html>
