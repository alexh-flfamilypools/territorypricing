<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-1);font-family:var(--font-body);}
  .wrap{padding:20px 24px;}
  .row{display:flex;gap:0;border-radius:14px;overflow:hidden;border:1px solid var(--line-1);}
  .tier{flex:1;height:88px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:#0E2233;}
  .tier.dark{color:#fff;}
  .label{font-size:11px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;opacity:0.95;outline:1px dashed transparent;border-radius:3px;padding:1px 4px;margin:-1px -4px;cursor:text;min-width:1ch;}
  .label:hover{outline-color:rgba(255,255,255,0.5);}
  .tier:not(.dark) .label:hover{outline-color:rgba(14,34,51,0.25);}
  .label:focus{outline:1.5px solid #fff;background:rgba(255,255,255,0.15);}
  .tier:not(.dark) .label:focus{outline-color:var(--fp-pool);background:rgba(255,255,255,0.5);}
  .key{display:flex;justify-content:space-between;margin-top:10px;font-size:11px;color:var(--fg-3);}
</style></head>
<body>
<div class="wrap">
  <div class="row">
    <div class="tier" style="background:#BFE3F4"><div class="label" contenteditable="true" spellcheck="false">Standard</div></div>
    <div class="tier dark" style="background:#7FCBE8"><div class="label" contenteditable="true" spellcheck="false">Preferred</div></div>
    <div class="tier dark" style="background:#2BA8E0"><div class="label" contenteditable="true" spellcheck="false">Premium</div></div>
    <div class="tier dark" style="background:#F5A623"><div class="label" contenteditable="true" spellcheck="false">Coastal</div></div>
    <div class="tier dark" style="background:#E8463E"><div class="label" contenteditable="true" spellcheck="false">Luxe</div></div>
    <div class="tier dark" style="background:#6B3FA0"><div class="label" contenteditable="true" spellcheck="false">White-glove</div></div>
  </div>
  <div class="key"><span>Cool → warm scale</span><span>Click any label to edit</span></div>
</div>
</body></html>
